name: publish-python

# Triggered by pushing a `python/v*` tag, or manual workflow_dispatch.
#
# Auth via PyPI Trusted Publishing — PyPI verifies the publish through
# OIDC against this workflow run (JackKXCO/kxco-post-quantum-verifiers/
# publish-python.yml). No PYPI_TOKEN secret is involved.
#
# To enable this, the project owner must add a pending publisher at
# https://pypi.org/manage/project/kxco-verify/settings/publishing/
# with:
#   Owner:             JackKXCO
#   Repository name:   kxco-post-quantum-verifiers
#   Workflow filename: publish-python.yml
#   Environment name:  (leave blank)
#
# All third-party actions pinned by 40-char commit SHA.

on:
  push:
    tags:
      - 'python/v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required for PyPI Trusted Publishing OIDC

jobs:
  publish:
    name: build + upload to PyPI
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./python
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Verify tests pass before publish
        run: python test_kxco_verify.py

      - name: Install build
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build sdist + wheel
        run: python -m build

      - name: Upload to PyPI (Trusted Publishing via OIDC)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: python/dist/
